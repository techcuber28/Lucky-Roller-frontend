<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="icon" type="image/png" href="/Assests/Images/signuplogingBG.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body {
            background-color: black;
            font-family: Orbitron, sans-serif;
            color: white;
        }
        .cool-button {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .cool-button:hover {
            background: linear-gradient(45deg, #5c0cad 0%, #1e64d8 100%);
            transform: translateY(-2px);
        }

        .cool-button:active {
            transform: translateY(1px);
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
        }

        .cool-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <script src="JS/settings.js"></script>
    <h1>Lucky Roller Settings</h1>
    <button class="cool-button" onclick="window.location.href='luckyRoller.html'">Back to Roller</button>
    <br><br><br><br><br>
    <input type="checkbox" id="rollLocks">
    <label for="rollLocks">Lock Rolls on rare Items</label>
    <br><br>
    <button class="cool-button" onclick="applySettings()">Apply Settings</button>
</body>
</html>
